  <text x="248" y="399" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="16">Between the fingers or 1-3 cm ahead.</text>

  <path d="M618 208C652 220 680 236 720 270" stroke="#222222" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="554" y="206" fill="#1A1E22" font-family="Avenir, Arial, sans-serif" font-size="21" font-weight="700">Tilt 10-15 deg down</text>
  <text x="554" y="230" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="16">Enough to see tabletop objects.</text>

  <circle cx="523" cy="136" r="11" fill="#3BB273"/>
