  <text x="48" y="584" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="15">Moving wires and drift.</text>

  <rect x="36" y="42" width="286" height="88" rx="16" fill="#FCFAF6" stroke="#D8CDBE"/>
  <text x="58" y="76" fill="#1A1E22" font-family="Avenir, Arial, sans-serif" font-size="22" font-weight="700">Photo overlay guide</text>
  <text x="58" y="103" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="16">Import this SVG over your photo in Figma.</text>
  <text x="58" y="123" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="16">Scale until the wrist box matches.</text>
