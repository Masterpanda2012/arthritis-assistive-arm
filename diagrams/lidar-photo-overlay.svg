  <text x="538" y="578" fill="#1A1E22" font-family="Avenir, Arial, sans-serif" font-size="20" font-weight="700">Avoid base mounting</text>
  <text x="538" y="602" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="15">The arm can block the beam.</text>

  <circle cx="170" cy="512" r="34" fill="#D64545" fill-opacity="0.10" stroke="#D64545" stroke-width="5"/>
  <path d="M149 491L191 533" stroke="#D64545" stroke-width="7" stroke-linecap="round"/>
