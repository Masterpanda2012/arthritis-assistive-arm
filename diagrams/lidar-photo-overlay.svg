  <text x="554" y="76" fill="#1A1E22" font-family="Avenir, Arial, sans-serif" font-size="22" font-weight="700">Top-front of wrist box</text>
  <text x="554" y="103" fill="#5A5249" font-family="Avenir, Arial, sans-serif" font-size="16">Center the LiDAR over the claw path.</text>

